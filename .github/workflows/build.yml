name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: cal2work
          - os: windows-latest
            platform: win
            artifact: cal2work.exe
          - os: macos-latest
            platform: macos
            artifact: cal2work

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node build.mjs ${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: cal2work-${{ matrix.platform }}
          path: release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mv artifacts/cal2work-linux/cal2work cal2work-linux
          mv artifacts/cal2work-win/cal2work.exe cal2work-win.exe
          mv artifacts/cal2work-macos/cal2work cal2work-macos

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            cal2work-linux
            cal2work-win.exe
            cal2work-macos
          generate_release_notes: true
